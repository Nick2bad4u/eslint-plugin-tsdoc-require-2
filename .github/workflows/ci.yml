name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    test:
        name: Test (${{ matrix.label }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 25
        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux
                      os: ubuntu-latest
                      codecov_flag: os-linux
                    - label: windows
                      os: windows-latest
                      codecov_flag: os-windows
                    - label: macos
                      os: macos-latest
                      codecov_flag: os-macos

        steps:
            - name: Harden the runner (Audit all outbound calls)
              if: ${{ matrix.os == 'ubuntu-latest' }}
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json 20.19.0

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Typecheck
              run: npm run typecheck

            - name: Lint repository
              run: npm run lint

            - name: Run tests with coverage and JUnit report
              run: npx vitest run --coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"

            - name: Verify coverage artifact
              run: python -c "from pathlib import Path; assert Path('coverage/lcov.info').is_file(), 'coverage/lcov.info was not generated'"

            - name: Verify JUnit artifact
              run: python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: Upload test results to Codecov
              if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
              uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  files: test-report.junit.xml
                  flags: unit,${{ matrix.codecov_flag }}
                  name: vitest-junit-${{ matrix.codecov_flag }}

            - name: Upload coverage to Codecov
              if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  slug: Nick2bad4u/eslint-plugin-tsdoc-require-2
                  files: ./coverage/lcov.info
                  flags: unit,${{ matrix.codecov_flag }}
                  name: vitest-unit-coverage-${{ matrix.codecov_flag }}
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

    eslint-runtime-compat:
        name: ESLint Runtime Compatibility (${{ matrix.label }})
        runs-on: ubuntu-latest
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                include:
                    - eslint-js-version: 9.0.0
                      eslint-version: 9.0.0
                      eslint-major: 9
                      label: 9.0.0
                    - eslint-js-version: ^9.39.1
                      eslint-version: ^9.39.1
                      eslint-major: 9
                      label: 9.latest
                    - eslint-js-version: 10.0.0
                      eslint-version: 10.0.0
                      eslint-major: 10
                      label: 10.0.0
                    - eslint-js-version: ^10.0.0
                      eslint-version: ^10.0.0
                      eslint-major: 10
                      label: 10.latest

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json 20.19.0

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Install ESLint runtime for compatibility smoke checks
              run: npm install --no-save --force eslint@${{ matrix.eslint-version }} @eslint/js@${{ matrix.eslint-js-version }}

            - name: Run ESLint compatibility smoke checks
              run: npm run lint:compat:eslint -- --expect-eslint-major=${{ matrix.eslint-major }}
